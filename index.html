<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoltStore — Electronics Shop</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">VoltStore</div>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Поиск...">
    </div>
    <div class="top-btns">
      <button><i class="fa-solid fa-moon"></i></button>
      <button><i class="fa-solid fa-bag-shopping"></i></button>
    </div>
  </header>

  <div class="filters">
    <button class="fbtn on" data-f="all">Все</button>
    <button class="fbtn" data-f="phone">Смартфоны</button>
    <button class="fbtn" data-f="laptop">Ноутбуки</button>
    <button class="fbtn" data-f="accessory">Аксессуары</button>
  </div>

  <div class="grid" id="grid"></div>

  <script src="script.js"></script>
</body>
</html>
